{{define "shell.main"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Foundry</title>
  <link rel="stylesheet" href="/style.css">
  <script defer src="/vendor/htmx-1.9.12.min.js"></script>
  <script defer src="/js/core.js"></script>
  <script defer src="/js/workflow.js"></script>
  <script defer src="/js/builder.js"></script>
  <script defer src="/js/chat.js"></script>
  <script defer src="/js/app.js"></script>
</head>
<body data-page="{{.Page}}">
  <a class="skip-link" href="#app">Skip to content</a>
  <header class="top-frame">
    <div class="brand-slab">
      <a href="/" hx-get="/chat/fragment" hx-target="#app" hx-push-url="/" class="brand">Foundry</a>
      <span class="brand-subtitle">intent / evidence / decisions</span>
    </div>
    <nav class="nav-slabs" aria-label="Primary navigation">
      <a href="/plans" data-nav="plans" hx-get="/plans/fragment" hx-target="#app" hx-push-url="/plans"{{if eq .Page "plans"}} class="active"{{end}}>Plans</a>
      <a href="/projects" data-nav="projects" hx-get="/projects/fragment" hx-target="#app" hx-push-url="/projects"{{if eq .Page "projects"}} class="active"{{end}}>Projects</a>
      <a href="/chat" data-nav="chat" hx-get="/chat/fragment" hx-target="#app" hx-push-url="/chat"{{if eq .Page "chat"}} class="active"{{end}}>Chat</a>
      <a href="/feedback" data-nav="feedback" hx-get="/feedback/fragment" hx-target="#app" hx-push-url="/feedback"{{if eq .Page "feedback"}} class="active"{{end}}>Feedback</a>
      <a href="/settings" data-nav="settings" hx-get="/settings/fragment" hx-target="#app" hx-push-url="/settings"{{if eq .Page "settings"}} class="active"{{end}}>Settings</a>
    </nav>
  </header>
  <div id="action-errors" class="error-region" role="alert" aria-live="assertive" hidden></div>
  <main id="app" tabindex="-1" hx-get="{{.Fragment}}" hx-trigger="load" hx-swap="innerHTML"></main>
</body>
</html>
{{end}}
